<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="780" viewBox="0 0 1000 780" role="img" aria-labelledby="title desc">
  <title id="title">API Troubleshooting Lab Architecture</title>
  <desc id="desc">Vendor-neutral diagram showing API Client, API Gateway using FastAPI, and Backend API using Flask, with request and response flow plus responsibilities for each service.</desc>

  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowSlate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f4f8fc; }
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .subtitle { font: 400 13px 'Segoe UI', Arial, sans-serif; fill:#475569; }
      .headerText { font: 700 18px 'Segoe UI', Arial, sans-serif; fill:#ffffff; }
      .subHeaderText { font: 400 13px 'Segoe UI', Arial, sans-serif; fill:#dbeafe; }
      .bodyText { font: 600 16px 'Segoe UI', Arial, sans-serif; fill:#1e293b; }
      .smallText { font: 600 13px 'Segoe UI', Arial, sans-serif; fill:#334155; }
      .mediumText { font: 700 16px 'Segoe UI', Arial, sans-serif; fill:#1f2937; }
      .labelText { font: 700 13px 'Segoe UI', Arial, sans-serif; letter-spacing:0.02em; fill:#2563eb; }
      .panel { fill:url(#panelBg); stroke:#bfdbfe; stroke-width:2; rx:22; ry:22; filter:url(#shadow); }
      .panelHeader { fill:url(#headerBg); rx:22; ry:22; }
      .clientBox { fill:#ffffff; stroke:#cbd5e1; stroke-width:2; rx:20; ry:20; filter:url(#shadow); }
      .lineReq { stroke:#3b82f6; stroke-width:4; fill:none; marker-end:url(#arrowBlue); }
      .lineResp { stroke:#64748b; stroke-width:3; fill:none; stroke-dasharray:10 10; marker-end:url(#arrowSlate); }
      .badge { fill:#eff6ff; stroke:#bfdbfe; stroke-width:1.5; rx:14; ry:14; }
      .iconCircle { fill:#eff6ff; stroke:#93c5fd; stroke-width:1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="780" rx="24"/>

  <text x="500" y="50" text-anchor="middle" class="title">API Troubleshooting Lab</text>
  <text x="500" y="72" text-anchor="middle" class="subtitle">Vendor-neutral architecture overview for the hub repository</text>

  <!-- Client -->
  <rect x="300" y="112" width="400" height="96" class="clientBox"/>
  <rect x="316" y="128" width="110" height="28" class="badge"/>
  <text x="371" y="147" text-anchor="middle" class="labelText">CLIENT</text>

  <!-- Client icon: simple monitor + request tooling hint -->
  <g transform="translate(346 165)">
    <rect x="0" y="0" width="42" height="26" rx="4" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="21" y1="26" x2="21" y2="34" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="10" y1="34" x2="32" y2="34" stroke="#2563eb" stroke-width="2.5"/>
    <path d="M9 13 L16 8 L16 18 Z" fill="#fb923c"/>
    <circle cx="29" cy="13" r="5" fill="none" stroke="#fb923c" stroke-width="2"/>
  </g>
  <text x="500" y="155" text-anchor="middle" class="title">API Client</text>
  <text x="500" y="185" text-anchor="middle" class="subtitle">curl · Postman · test scripts</text>

  <!-- Gateway panel -->
  <rect x="180" y="290" width="640" height="180" class="panel"/>
  <rect x="180" y="290" width="640" height="50" class="panelHeader"/>
  <text x="500" y="312" text-anchor="middle" class="headerText">API Gateway (FastAPI)</text>
  <text x="500" y="332" text-anchor="middle" class="subHeaderText">Edge layer for controlled request handling</text>

  <!-- Gateway icon -->
  <g transform="translate(215 305)">
    <rect x="0" y="0" width="28" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="21" cy="9" r="2.2" fill="#ffffff"/>
    <path d="M6 13 L13 10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(240 364)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <path d="M9 -1 C9 -6 13 -9 16 -11 C19 -9 23 -6 23 -1 C23 4 20 8 16 11 C12 8 9 4 9 -1 Z" fill="#2563eb"/>
    <circle cx="16" cy="0" r="4" fill="#ffffff"/>
  </g>
  <text x="290" y="368" class="bodyText">API key authentication</text>

  <g transform="translate(240 404)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <path d="M9 6 A10 10 0 1 1 23 6" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="16" y1="0" x2="22" y2="-5" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="290" y="408" class="bodyText">Rate limiting</text>

  <g transform="translate(240 444)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <circle cx="14" cy="-2" r="5" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <line x1="18" y1="2" x2="24" y2="8" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M6 -2 C8 -8 20 -8 22 -2" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.75"/>
  </g>
  <text x="290" y="448" class="bodyText">Request tracing</text>

  <!-- Backend panel -->
  <rect x="180" y="556" width="640" height="180" class="panel"/>
  <rect x="180" y="556" width="640" height="50" class="panelHeader"/>
  <text x="500" y="578" text-anchor="middle" class="headerText">Backend API (Flask)</text>
  <text x="500" y="598" text-anchor="middle" class="subHeaderText">Payload processing and failure analysis</text>

  <!-- Backend icon -->
  <g transform="translate(214 568)">
    <path d="M9 0 h14" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12 0 v10 l-6 10 a6 6 0 0 0 5 9 h10 a6 6 0 0 0 5 -9 l-6 -10 v-10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M13 19 C16 16 20 19 22 16" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(240 630)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <text x="16" y="5" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial, sans-serif; fill:#2563eb;">&lt;/&gt;</text>
  </g>
  <text x="290" y="634" class="bodyText">XML payload handling</text>

  <g transform="translate(240 670)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <path d="M10 0 l4 4 l8 -10" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="290" y="674" class="bodyText">Request validation</text>

  <g transform="translate(240 710)">
    <circle cx="16" cy="0" r="15" class="iconCircle"/>
    <path d="M16 -9 L25 8 H7 Z" fill="#2563eb" opacity="0.95"/>
    <line x1="16" y1="-2" x2="16" y2="4" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="16" cy="7" r="1.3" fill="#ffffff"/>
  </g>
  <text x="290" y="714" class="bodyText">Integration failure simulation</text>

  <!-- Flow arrows -->
  <line x1="480" y1="212" x2="480" y2="280" class="lineReq"/>
  <line x1="550" y1="290" x2="550" y2="220" class="lineResp"/>
  <text x="578" y="246" class="mediumText">response</text>
  <text x="390" y="246" class="mediumText">request</text>

  <line x1="480" y1="476" x2="480" y2="544" class="lineReq"/>
  <line x1="550" y1="554" x2="550" y2="484" class="lineResp"/>
  <text x="578" y="510" class="mediumText">response</text>
  <text x="390" y="510" class="mediumText">request</text>
</svg>
